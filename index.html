<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北中區域位置偵測 - YouTube 自動播放</title>
    <style>
        /* 視覺設計參考 image_6c115c.png */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background-color: #f8f9fa; 
        }
        .container { 
            max-width: 400px; width: 90%; background: white; 
            padding: 40px 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
        }
        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .range-info { color: #666; margin-bottom: 25px; }
        
        button { 
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; 
            background-color: #ff5722; color: white; border: none; 
            border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #info { margin-top: 30px; color: #444; font-size: 1rem; line-height: 1.6; }
        .alert { color: #ff5722; font-weight: bold; font-size: 1.1rem; }
        
        /* 隱藏 YouTube 播放器實體 */
        #yt-player { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>區域音樂自動播放</h2>
    <p class="range-info">偵測範圍：台中市 至 台北市</p>
    
    <button id="startBtn" onclick="initMonitor()">啟動監測系統</button>
    
    <div id="info">請點擊按鈕授權定位與音樂播放</div>
    
    <!-- 隱藏的播放器容器 -->
    <div id="yt-player"></div>
</div>

<script>
    let player;
    const infoDisp = document.getElementById('info');
    const startBtn = document.getElementById('startBtn');

    // 指定影片 ID: wD71Rfa9odc
    const TARGET_VIDEO_ID = 'wD71Rfa9odc';
    
    // 定義緯度範圍 (台中 24.1 至 台北 25.3)
    const MIN_LAT = 24.1; 
    const MAX_LAT = 25.3;

    // 1. 載入 YouTube IFrame Player API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // 2. 初始化播放器
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0',
            width: '0',
            videoId: TARGET_VIDEO_ID,
            playerVars: {
                'playsinline': 1, // 在 iOS 上不自動切換全螢幕
                'loop': 1,        // 循環播放
                'playlist': TARGET_VIDEO_ID
            },
            events: {
                'onReady': () => console.log("播放器準備就緒")
            }
        });
    }

    // 3. 使用者點擊啟動（必須由使用者觸發才能解鎖音訊）
    function initMonitor() {
        if (!player || typeof player.playVideo !== 'function') {
            alert("播放器載入中，請稍候再試");
            return;
        }

        // 立即嘗試播放並暫停，這步是「解鎖」手機瀏覽器限制的關鍵
        player.playVideo();
        setTimeout(() => {
            player.pauseVideo();
            startBtn.disabled = true;
            startBtn.innerText = "監測中...";
            infoDisp.innerText = "🔊 音樂已授權，正在獲取 GPS 位置...";
            startTracking();
        }, 500);
    }

    // 4. 啟動位置追蹤
    function startTracking() {
        if (!navigator.geolocation) {
            infoDisp.innerText = "您的裝置不支援定位功能";
            return;
        }
        
        navigator.geolocation.watchPosition(updatePosition, handleError, {
            enableHighAccuracy: true,
            maximumAge: 10000,
            timeout: 20000
        });
    }

    // 5. 判斷位置並控制播放
    function updatePosition(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        let statusHtml = `緯度: ${lat.toFixed(4)}<br>經度: ${lng.toFixed(4)}<br>`;

        if (lat >= MIN_LAT && lat <= MAX_LAT) {
            statusHtml += `<br><span class="alert">🚨 進入目標區域！正在播放音樂</span>`;
            // 若不在播放狀態 (1 代表正在播放)，則啟動播放
            if (player.getPlayerState() !== 1) {
                player.playVideo();
            }
        } else {
            statusHtml += `<br><span>✅ 目前在區域外，音樂停止</span>`;
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
            }
        }
        infoDisp.innerHTML = statusHtml;
    }

    function handleError(error) {
        infoDisp.innerHTML = `<span style="color:red;">定位失敗：${error.message}</span>`;
    }
</script>

</body>
</html>
