<!DOCTYPE html>
<html>
<head>
    <title>GPS Tracker - 台中學校</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        html, body { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100%; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
const initialCoordinates = [24.1477, 120.6736]; // 台中火車站

let phoneId = localStorage.getItem("phoneId");
if (!phoneId) {
    phoneId = "phone-" + Math.random().toString(36).slice(2,10);
    localStorage.setItem("phoneId", phoneId);
}

let map = L.map('map').setView(initialCoordinates, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker = L.marker(initialCoordinates).addTo(map);

async function updateLocation() {
    try {
        let response = await fetch('http://34.31.102.195:3000/api/locations'); // VM外部IP
        let data = await response.json();

        if (data && data.lat && data.lng) {
            map.setView([data.lat, data.lng], 13);
            marker.setLatLng([data.lat, data.lng]);
        } else {
            // 定位失敗 → 顯示固定位置 & 送 999
            map.setView(initialCoordinates, 13);
            marker.setLatLng(initialCoordinates);
            await fetch('http://34.31.102.195:3000/api/locations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: phoneId, lat: 999, lng: 999 })
            });
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        map.setView(initialCoordinates, 13);
        marker.setLatLng(initialCoordinates);
        await fetch('http://34.31.102.195:3000/api/locations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: phoneId, lat: 999, lng: 999 })
        });
    }
    setTimeout(updateLocation, 5000); // 5秒更新一次
}

updateLocation();
</script>
</body>
</html>
