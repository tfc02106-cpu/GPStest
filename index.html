<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Tracker - 台中火車站</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100%; }
#status { position:absolute; top:10px; left:10px; z-index:1000; background:white; padding:5px; border:1px solid gray; }
</style>
</head>
<body>
<div id="status">等待定位...</div>
<div id="map"></div>
<script>
const initialCoordinates = [24.1477, 120.6736]; // 台中火車站座標

let phoneId = localStorage.getItem("phoneId");
if (!phoneId) {
    phoneId = "phone-" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("phoneId", phoneId);
}

let map = L.map('map').setView(initialCoordinates, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker(initialCoordinates).addTo(map);

async function updateLocation() {
    try {
        // 改成你的 VM 外部 IP
        let response = await fetch('http://34.31.102.195:3000/api/locations');
        let data = await response.json();

        if (data && data.lat && data.lng) {
            map.setView([data.lat, data.lng], 13);
            marker.setLatLng([data.lat, data.lng]);
        } else {
            console.log("定位失敗，使用台中火車站座標");
            map.setView(initialCoordinates, 13);
            marker.setLatLng(initialCoordinates);
        }
    } catch(e) {
        console.error(e);
        console.log("連線錯誤，使用台中火車站座標");
        map.setView(initialCoordinates, 13);
        marker.setLatLng(initialCoordinates);
    }
    setTimeout(updateLocation, 5000);
}

updateLocation();
</script>
</body>
</html>
